name: flutter_launcher_icons_flavors
description: Flavor-aware fork of flutter_launcher_icons. Generates Android, iOS, macOS, Web, and Windows icons from one consolidated YAML config.
version: 1.0.0
# Maintained by Ido Zahavy (@tmura-ido)
homepage: https://github.com/tmura-ido/flutter_launcher_icons_flavors
repository: https://github.com/tmura-ido/flutter_launcher_icons_flavors
issue_tracker: https://github.com/tmura-ido/flutter_launcher_icons_flavors/issues

topics:
  - icons
  - flutter
  - launcher
  - flavors
  - cli

platforms:
  linux:
  macos:
  windows:

environment:
  sdk: ^3.8.0

executables:
  flutter_launcher_icons_flavors:

dependencies:
  args: ^2.5.0
  checked_yaml: ^2.0.3
  cli_util: ^0.4.1
  image: ^4.2.0
  json_annotation: ^4.9.0
  path: ^1.9.0
  yaml: ^3.1.2

dev_dependencies:
  # Needed by build_version
  build_runner: ^2.4.12
  # https://pub.dev/packages/build_version
  build_version: ^2.1.1
  json_serializable: ^6.8.0
  lints: ^6.0.0
  mockito: ^5.4.4
  test: ^1.25.8
  test_descriptor: ^2.0.1
